<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="description" content="Hsi's personal browser homepage" />

        <!-- Corrected path if valid, otherwise might be broken but script is priority -->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

        <!-- Preload critical mountain asset to prevent flash on load -->
        <link
            rel="preload"
            href="/src/assets/images/mountain/front.svg"
            as="image"
            type="image/svg+xml"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <title>Hsi | Homepage</title>
        <script>
            try {
                const root = document.documentElement;
                const savedTheme = localStorage.getItem('theme');
                const isDark =
                    savedTheme === 'dark' ||
                    (savedTheme === null &&
                        matchMedia('(prefers-color-scheme: dark)').matches);

                root.dataset.theme = isDark ? 'dark' : 'light';
                root.style.colorScheme = isDark ? 'dark' : 'light';
            } catch {
                document.documentElement.dataset.theme = 'light';
                document.documentElement.style.colorScheme = 'light';
            }
        </script>
        <script type="module" src="/src/index.tsx"></script>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
